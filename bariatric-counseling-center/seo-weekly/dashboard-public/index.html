<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<title>BCC Online Reach</title>
<meta name="description" content="Bariatric Counseling Center -- live snapshot of where BCC shows up online for searches relevant to its services." />
<style>
  :root {
    --teal: #4ECDC4;
    --teal-soft: #e7f9f7;
    --teal-line: #b5e8e3;
    --teal-deep: #2eb1a8;
    --navy: #2c3e50;
    --navy-soft: #f4f6f8;
    --text: #1f2d3a;
    --muted: #5b6b78;
    --bg: #ffffff;
    --bg-soft: #f8fafb;
    --line: #e3e9ee;
    --shadow-sm: 0 1px 2px rgba(44,62,80,0.04);
    --shadow-md: 0 1px 3px rgba(44,62,80,0.06), 0 4px 14px rgba(44,62,80,0.05);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg-soft);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
  @media (max-width: 600px) { .container { padding: 0 16px; } }

  /* ----- Header (compact, dashboard-like) ----- */
  .topbar {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: 18px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar h1::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 22px;
    background: var(--teal);
    border-radius: 2px;
  }
  .topbar .updated {
    font-size: 12px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .topbar .updated .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--teal);
    box-shadow: 0 0 0 0 rgba(78,205,196,0.6);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(78,205,196,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(78,205,196,0); }
    100% { box-shadow: 0 0 0 0 rgba(78,205,196,0); }
  }

  /* ----- Page sections ----- */
  section { padding: 28px 0; }
  section.tight { padding: 18px 0 28px; }

  /* ----- Stat row ----- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .stats { grid-template-columns: 1fr; } }
  .stat {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .stat::after {
    content: "";
    position: absolute;
    top: 18px; right: 20px;
    width: 22px; height: 2px;
    background: var(--teal);
    border-radius: 1px;
  }
  .stat .num {
    font-size: 38px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .stat .label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.4;
  }

  /* ----- Section titles ----- */
  h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin: 0 0 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h2::before {
    content: "";
    display: inline-block;
    width: 16px;
    height: 2px;
    background: var(--teal);
    border-radius: 1px;
  }

  /* ----- Service area grid ----- */
  .areas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) { .areas { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .areas { grid-template-columns: 1fr; } }
  .area {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .area::before {
    content: "";
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: var(--teal);
  }
  .area-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .area-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.3;
    flex: 1;
  }
  .area-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    letter-spacing: -0.02em;
    text-align: right;
    margin-top: 2px;
  }
  .area-num small {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    display: block;
    margin-top: 2px;
    letter-spacing: 0;
  }
  .area-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .area-meta .pip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    background: var(--teal-soft);
    border: 1px solid var(--teal-line);
    color: var(--navy);
    border-radius: 10px;
    font-weight: 600;
  }
  .area-spark {
    margin-top: 12px;
    height: 28px;
    width: 100%;
  }
  .area-spark svg { width: 100%; height: 100%; }

  /* ----- Heatmap ----- */
  .heatmap-wrap {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px 22px;
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
  }
  .heatmap {
    display: grid;
    gap: 4px;
    min-width: 480px;
  }
  .heatmap-row { display: grid; gap: 4px; align-items: center; }
  .heatmap-label {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    padding-right: 10px;
    font-weight: 500;
  }
  .heatmap-label.head { font-weight: 700; color: var(--navy); }
  .heatmap-cell {
    height: 28px;
    border-radius: 4px;
    background: var(--bg-soft);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--navy);
    border: 1px solid transparent;
  }
  .heatmap-cell.h0 { background: #f6f9fa; color: #aab4be; border-color: var(--line); }
  .heatmap-cell.h1 { background: #e7f9f7; color: var(--navy); }
  .heatmap-cell.h2 { background: #c1ecea; color: var(--navy); }
  .heatmap-cell.h3 { background: #8ddad5; color: var(--navy); }
  .heatmap-cell.h4 { background: var(--teal); color: var(--navy); }
  .heatmap-cell.h5 { background: var(--teal-deep); color: white; }
  .heatmap-cell.head {
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    height: 20px;
  }
  .heatmap-key {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .heatmap-key .scale {
    display: inline-flex;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .heatmap-key .scale span { display: inline-block; width: 22px; height: 12px; }

  /* ----- Footer ----- */
  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.65);
    padding: 22px 0;
    margin-top: 28px;
    font-size: 12px;
  }
  footer .footer-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  footer .brand-mark {
    color: white;
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  footer .brand-mark::before {
    content: "";
    display: inline-block;
    width: 14px; height: 2px; background: var(--teal);
  }
  footer a { color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.3); }
  footer a:hover { border-bottom-color: var(--teal); color: white; }

  /* ----- States ----- */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    font-size: 13px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--teal-line);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }

  /* v3 -- area card topic list + expand */
  .area { display: flex; flex-direction: column; }
  .area-topics { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--line); display: flex; flex-direction: column; gap: 6px; }
  .area-topic { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12px; line-height: 1.35; }
  .area-topic-name { color: var(--text); flex: 1; }
  .area-topic-locale { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .area-topic-rank { flex-shrink: 0; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .area-topic-rank.t1 { background: var(--navy); color: white; }
  .area-topic-rank.t10 { background: var(--teal-soft); color: var(--navy); border: 1px solid var(--teal-line); }
  .area-topic-rank.t20 { background: var(--bg-soft); color: var(--muted); border: 1px solid var(--line); }
  .area-expand-btn { margin-top: 8px; background: none; border: none; padding: 4px 0; color: var(--teal-deep); font-size: 11px; font-weight: 600; cursor: pointer; text-align: left; font-family: inherit; }
  .area-expand-btn:hover { color: var(--navy); }
  .area-topics-all { display: none; flex-direction: column; gap: 6px; padding-top: 6px; }
  .area-topics-all.shown { display: flex; }
  .area-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 6px 0; }


  /* v4 -- cluster groupings for tracked pages */
  .cluster { margin-bottom: 26px; }
  .cluster-head { display: flex; align-items: center; gap: 10px; margin: 0 0 10px; padding: 0 4px; }
  .cluster-head .cluster-name { font-size: 13px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.04em; }
  .cluster-head .cluster-count { font-size: 11px; color: var(--muted); padding: 2px 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; }
  .cluster-head .cluster-line { flex: 1; height: 1px; background: var(--line); }
  .page-card .page-stat-num.building { font-size: 14px; color: var(--muted); font-weight: 600; }

  /* v3 -- recently published pages */
  .pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .page-card { background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--teal); border-radius: 8px; padding: 16px 18px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; }
  .page-card .page-title { font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.3; }
  .page-card .page-meta { font-size: 11px; color: var(--muted); }
  .page-card .page-meta strong { color: var(--text); font-weight: 600; }
  .page-card .page-stats { display: flex; gap: 18px; padding-top: 8px; border-top: 1px dashed var(--line); }
  .page-card .page-stat { display: flex; flex-direction: column; }
  .page-card .page-stat-num { font-size: 22px; font-weight: 700; color: var(--navy); line-height: 1; }
  .page-card .page-stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.3; }
  .page-card .page-spark { height: 28px; }
  .page-card .page-spark svg { width: 100%; height: 100%; }
  .page-card .page-keywords-list { font-size: 11px; color: var(--muted); padding-top: 8px; border-top: 1px dashed var(--line); line-height: 1.5; }
  .page-card .page-keywords-list strong { color: var(--text); font-weight: 600; }

  .error {
    background: var(--bg);
    border: 1px solid var(--line);
    border-left: 3px solid var(--navy);
    padding: 14px 18px;
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* v5 -- GSC reach panel */
  .reach-banner { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; box-shadow: var(--shadow-sm); margin-bottom: 24px; position: relative; }
  .reach-banner::before { content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 4px; background: var(--teal); border-radius: 12px 0 0 12px; }
  .reach-banner h3 { margin: 0 0 6px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .reach-banner h3::before { content: ""; width: 14px; height: 2px; background: var(--teal); }
  .reach-banner .reach-line { font-size: 17px; color: var(--text); line-height: 1.55; max-width: 720px; }
  .reach-banner .reach-line strong { color: var(--navy); font-weight: 700; }

  .topics-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-top: 10px; }
  @media (max-width: 720px) { .topics-list { grid-template-columns: 1fr; } }
  .topic-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px dotted var(--line); font-size: 14px; }
  .topic-row .t-name { color: var(--text); }
  .topic-row .t-imp { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .topic-row .t-imp strong { color: var(--navy); font-weight: 700; }

</style>
</head>
<body>

<div class="topbar">
  <div class="container topbar-inner">
    <h1>BCC Online Reach</h1>
    <div class="updated"><span class="pulse"></span><span id="updated-line">--</span></div>
  </div>
</div>

<main>
  <div id="loading" class="loading"><span class="spinner"></span> Loading latest snapshot...</div>
  <div id="content" class="hidden">
    <div class="container">

      <section class="tight">
        <div class="stats" id="stats"></div>
      </section>

      <section>
        <div class="reach-banner" id="reach-banner" style="display:none;">
          <h3>This week's online reach</h3>
          <div class="reach-line" id="reach-line"></div>
        </div>
      </section>

      <section>
        <h2>Top searches that reached BCC this week</h2>
        <div class="reach-banner" id="top-searches-card" style="padding:18px 22px;">
          <div class="topics-list" id="top-searches-list"></div>
        </div>
      </section>

      <section>
        <h2>Service Areas</h2>
        <div class="areas" id="areas"></div>
      </section>

      <section>
        <h2>Tracked Strategic Pages</h2>
        <div id="clusters-wrap"></div>
      </section>

      <section>
        <h2>Reach Across Recent Weeks</h2>
        <div class="heatmap-wrap">
          <div class="heatmap" id="heatmap"></div>
          <div class="heatmap-key">
            <span>Page-one rankings per area:</span>
            <span class="scale">
              <span style="background:#f6f9fa;"></span>
              <span style="background:#e7f9f7;"></span>
              <span style="background:#c1ecea;"></span>
              <span style="background:#8ddad5;"></span>
              <span style="background:var(--teal);"></span>
              <span style="background:var(--teal-deep);"></span>
            </span>
            <span>none -> many</span>
          </div>
        </div>
      </section>

    </div>
  </div>
</main>

<footer>
  <div class="container footer-inner">
    <div class="brand-mark">Bariatric Counseling Center</div>
    <div>
      <span id="footer-updated">--</span> &middot; <a href="https://www.bariatriccounselingcenter.com" rel="noopener">bariatriccounselingcenter.com</a>
    </div>
  </div>
</footer>

<script>
"use strict";

// ===== CONFIG =====
// Data is read directly from the public GitHub repo (austintude/cowork-cron-jobs).
// The runner writes seo-data-*.json + manifest.json into the local clone of that
// repo, then a `git push` publishes it. The board fetches from raw.githubusercontent
// with jsdelivr as a CDN fallback.
//
// NOTE -- earlier (2026-05-12) this was switched to a SiteGround /seo/bcc/data/
// path with SFTP uploads. That direction was reverted on 2026-05-18 because it
// required a separate hosting account and broke the single-source-of-truth design.
const REPO_OWNER = "austintude";
const REPO_NAME  = "cowork-cron-jobs";
const SUBPATH    = "bariatric-counseling-center/seo-weekly";

const RAW_GH   = (path) => `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${SUBPATH}/${path}`;
const JSDELIVR = (path) => `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@main/${SUBPATH}/${path}`;

// ===== SERVICE AREA TAXONOMY =====
// Maps raw keywords from the JSON to BCC service areas. Anything not listed is grouped as "Other".
// Branded keywords (BCC name) are skipped.
const SERVICE_AREAS = [
  {
    id: "bariatric",
    name: "Bariatric Counseling & Surgery Support",
    keywords: [
      "bariatric counseling san antonio",
      "bariatric counseling",
      "bariatric surgery counseling san antonio",
      "bariatric surgery counseling",
      "bariatric surgery psychological evaluation san antonio",
      "bariatric surgery psychological evaluation",
      "bariatric therapy san antonio",
      "bariatric therapy",
      "online bariatric counseling texas",
      "consejeria bariatrica san antonio"
    ]
  },
  {
    id: "weight-mgmt",
    name: "Weight Management",
    keywords: [
      "weight loss counseling san antonio",
      "weight loss counseling",
      "obesity counseling san antonio",
      "weight management therapist san antonio",
      "weight management program san antonio",
      "weight management counseling san antonio",
      "weight loss therapy san antonio",
      "weight loss therapy",
      "weight management therapy",
      "weight management after bariatric surgery"
    ]
  },
  {
    id: "eating-concerns",
    name: "Eating Concerns",
    keywords: [
      "emotional eating therapy san antonio",
      "emotional eating therapy",
      "therapy for emotional eating",
      "how to stop emotional eating",
      "how to overcome emotional eating",
      "binge eating treatment san antonio",
      "binge eating disorder treatment",
      "binge eating disorder therapy",
      "food addiction treatment san antonio",
      "food addiction treatment",
      "overeating treatment san antonio",
      "overeating treatment",
      "compulsive overeating san antonio",
      "eating disorder iop san antonio",
      "eating disorder iop",
      "eating disorder therapist san antonio",
      "eating disorder treatment san antonio",
      "eating disorder counseling san antonio"
    ]
  },
  {
    id: "med-adjunct",
    name: "Behavioral Support with Medications",
    keywords: [
      "semaglutide behavioral support san antonio",
      "semaglutide behavioral support",
      "ozempic counseling",
      "ozempic behavioral support san antonio",
      "behavioral support for weight loss medications"
    ]
  },
  {
    id: "nutrition",
    name: "Nutrition Care",
    keywords: [
      "registered dietitian san antonio",
      "nutrition counseling san antonio",
      "nutrition counseling",
      "registered dietitian weight loss",
      "dietista registrada san antonio"
    ]
  },
  {
    id: "telehealth",
    name: "Telehealth & Online Care",
    keywords: [
      "telehealth weight management texas",
      "online weight management therapy texas",
      "virtual emotional eating therapy texas"
    ]
  }
];



// ===== KEYWORD PRESENTATION =====
// Map raw keywords -> board-friendly labels with locale tag.
const KEYWORD_LABELS = {
  "bariatric counseling san antonio":             { label: "Bariatric counseling",                          locale: "San Antonio" },
  "weight loss counseling san antonio":           { label: "Counseling around weight management",            locale: "San Antonio" },
  "obesity counseling san antonio":               { label: "Counseling for people in larger bodies",         locale: "San Antonio" },
  "weight management therapist san antonio":      { label: "Weight management therapy",                      locale: "San Antonio" },
  "registered dietitian san antonio":             { label: "Registered dietitian services",                  locale: "San Antonio" },
  "emotional eating therapy san antonio":         { label: "Emotional eating therapy",                       locale: "San Antonio" },
  "binge eating treatment san antonio":           { label: "Support for binge eating",                       locale: "San Antonio" },
  "food addiction treatment san antonio":         { label: "Support around food and addiction",              locale: "San Antonio" },
  "weight loss therapy san antonio":              { label: "Therapy supporting weight management",            locale: "San Antonio" },
  "overeating treatment san antonio":             { label: "Support for compulsive overeating",              locale: "San Antonio" },
  "eating disorder iop san antonio":              { label: "Intensive outpatient eating disorder care",      locale: "San Antonio" },
  "bariatric surgery counseling san antonio":     { label: "Bariatric surgery counseling",                   locale: "San Antonio" },
  "weight management program san antonio":        { label: "Weight management program",                      locale: "San Antonio" },
  "eating disorder therapist san antonio":        { label: "Eating disorder therapy",                        locale: "San Antonio" },

function friendlyKeyword(rawKey) {
  if (rawKey in KEYWORD_LABELS) return KEYWORD_LABELS[rawKey];
  let label = rawKey.replace(/\bsan antonio\b/i, "").replace(/\btexas\b/i, "").trim().replace(/\s+/g, " ");
  label = label.replace(/\b\w/g, c => c.toUpperCase());
  let locale = "Search";
  if (/san antonio/i.test(rawKey)) locale = "San Antonio";
  else if (/texas/i.test(rawKey)) locale = "Texas";
  else locale = "National searches";
  return { label, locale };
}

// ===== FETCH =====
async function fetchJSON(url, { bypassCache = false } = {}) {
  const finalUrl = bypassCache ? `${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}` : url;
  const res = await fetch(finalUrl, { cache: bypassCache ? "no-store" : "default" });
  if (!res.ok) throw new Error(`${url} -> HTTP ${res.status}`);
  return await res.json();
}

async function loadManifest() {
  return await fetchJSON(RAW_GH("manifest.json"), { bypassCache: true });
}

async function loadDataFile(filename, opts = {}) {
  // Latest file may get retroactive edits (e.g., GSC merged after the run).
  // Caller passes opts.isLatest=true for the manifest.latest file -> we use raw.github with cache-bust.
  // Historical files use jsdelivr (cached, fine since they don't change).
  if (opts.isLatest) {
    try {
      return await fetchJSON(RAW_GH(`data/${filename}`), { bypassCache: true });
    } catch (e) {
      return await fetchJSON(JSDELIVR(`data/${filename}`));
    }
  }
  try {
    return await fetchJSON(JSDELIVR(`data/${filename}`));
  } catch (e) {
    return await fetchJSON(RAW_GH(`data/${filename}`), { bypassCache: true });
  }
}

// For one data file, return: per-area count of page-one rankings + count of #1 rankings
function summarize(data) {
  const all = Object.entries((data.brave && data.brave.all_keywords) || {});
  const summary = {};
  for (const a of SERVICE_AREAS) {
    summary[a.id] = { name: a.name, top10: 0, top1: 0, total: a.keywords.length };
  }
  let totalTop1 = 0, totalTop10 = 0, totalTracked = 0;
  for (const [raw, v] of all) {
    if (SKIP_KEYWORDS.has(raw)) continue;
    totalTracked++;
    const inTop10 = v.position != null && v.position <= 10;
    const isTop1 = v.position === 1;
    if (inTop10) totalTop10++;
    if (isTop1) totalTop1++;
    const area = areaForKeyword(raw);
    if (!area) continue;
    if (inTop10) summary[area.id].top10++;
    if (isTop1) summary[area.id].top1++;
  }
  return { perArea: summary, totalTop1, totalTop10, totalTracked, date: data.date };
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "className") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

function sparklineSVG(values, { width = 160, height = 28 } = {}) {
  if (!values.length) return "";
  const max = Math.max(...values, 1);
  const stepX = width / Math.max(values.length - 1, 1);
  const points = values.map((v, i) => {
    const x = i * stepX;
    const y = height - ((v / max) * (height - 4)) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const linePoints = points.join(" ");
  // Area under
  const areaPoints = `0,${height} ${linePoints} ${width},${height}`;
  const lastVal = values[values.length - 1];
  const lastX = (values.length - 1) * stepX;
  const lastY = height - ((lastVal / max) * (height - 4)) - 2;
  return `
    <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${areaPoints}" fill="rgba(78,205,196,0.18)"/>
      <polyline points="${linePoints}" fill="none" stroke="#2eb1a8" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="2.5" fill="#2c3e50"/>
    </svg>`;
}

    const ranking = topics.filter(t => t.position != null && t.position <= 10);

function renderHeatmap(history) {
  const wrap = document.getElementById("heatmap");
  wrap.innerHTML = "";
  if (!history.length) {
    wrap.appendChild(el("div", { className: "heatmap-row", style: "grid-template-columns: 1fr;" }, el("div", { className: "heatmap-label" }, "No history yet -- the heatmap will populate as more weekly checks accumulate.")));
    return;
  }
  // Determine grid columns: label + N week columns
  const weeks = history.length;
  const labelWidth = 160;
  const cellMin = 40;
  const colTpl = `${labelWidth}px repeat(${weeks}, minmax(${cellMin}px, 1fr))`;
  // Header row: blank label cell + dates
  const headRow = el("div", { className: "heatmap-row", style: `grid-template-columns: ${colTpl};` });
  headRow.appendChild(el("div", { className: "heatmap-label head" }, "Service area"));
  for (const h of history) {
    headRow.appendChild(el("div", { className: "heatmap-cell head" }, fmtDate(h.date)));
  }
  wrap.appendChild(headRow);
  // Body: one row per area
  // Determine max top10 across history for color binning
  let max = 0;
  for (const h of history) for (const a of SERVICE_AREAS) {
    const v = (h.perArea[a.id] && h.perArea[a.id].top10) || 0;
    if (v > max) max = v;
  }
  if (max === 0) max = 1;
  function cls(v) {
    if (v === 0) return "h0";
    const ratio = v / max;
    if (ratio < 0.2) return "h1";
    if (ratio < 0.4) return "h2";
    if (ratio < 0.6) return "h3";
    if (ratio < 0.85) return "h4";
    return "h5";
  }
  for (const a of SERVICE_AREAS) {
    const row = el("div", { className: "heatmap-row", style: `grid-template-columns: ${colTpl};` });
    row.appendChild(el("div", { className: "heatmap-label" }, a.name));
    for (const h of history) {
      const v = (h.perArea[a.id] && h.perArea[a.id].top10) || 0;
      row.appendChild(el("div", { className: `heatmap-cell ${cls(v)}`, title: `${a.name} -- ${fmtDate(h.date)}: ${v} on page one` }, v > 0 ? String(v) : ""));
    }
    wrap.appendChild(row);
  }
}


function daysBetween(a, b) {
  if (!a || !b) return 0;
  const ad = new Date(a + "T12:00:00");
  const bd = new Date(b + "T12:00:00");
  return Math.max(0, Math.round((bd - ad) / 86400000));
}

function buildPageMetricsForPath(path, allDataFiles) {
  // Walk all historical files and compute trajectory for THIS path
  // Returns { firstSeen, daysLive, trajectory, bestPosLatest, keywordsRankingLatest, topicLabel }
  let firstSeen = null;
  for (const d of allDataFiles) {
    const newPages = d.newly_published_prod_pages || [];
    if (newPages.includes(path) && !firstSeen) firstSeen = d.date;
  }
  // If never appeared in newly_published_prod_pages, infer first seen as the earliest date
  // any keyword's ranking_url contained this path
  if (!firstSeen) {
    for (const d of allDataFiles) {
      const all = (d.brave && d.brave.all_keywords) || {};
      for (const v of Object.values(all)) {
        if (v.ranking_url && v.ranking_url.includes(path)) { firstSeen = d.date; break; }
      }
      if (firstSeen) break;
    }
  }
  const today = (allDataFiles[allDataFiles.length - 1] || {}).date;
  const trajectory = [];
  let bestPosLatest = null, keywordsRankingLatest = 0, topicLabel = null;
  for (const d of allDataFiles) {
    if (firstSeen && d.date < firstSeen) continue;
    let bestPos = null, keywordsRanking = 0, bestKwRaw = null;
    const all = (d.brave && d.brave.all_keywords) || {};
    for (const [kw, v] of Object.entries(all)) {
      const url = v.ranking_url || "";
      if (!url.includes(path)) continue;
      if (v.position != null) keywordsRanking++;
      if (v.position != null && (bestPos == null || v.position < bestPos)) {
        bestPos = v.position;
        bestKwRaw = kw;
      }
    }
    trajectory.push({ date: d.date, position: bestPos, keywordsRanking });
    if (d.date === today) {
      bestPosLatest = bestPos;
      keywordsRankingLatest = keywordsRanking;
      if (bestKwRaw) {
        const f = friendlyKeyword(bestKwRaw);
        topicLabel = f ? f.label : bestKwRaw;
      }
    }
  }
  return {
    firstSeen,
    daysLive: firstSeen && today ? daysBetween(firstSeen, today) : null,
    trajectory,
    bestPosLatest,
    keywordsRankingLatest,
    topicLabel
  };
}

        card.appendChild(sparkDiv);
      }

      grid.appendChild(card);
    }
    clusterDiv.appendChild(grid);
    wrap.appendChild(clusterDiv);
  }
}

function formatPublishDate(d) {
  if (!d) return "--";
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}


function renderReachBanner(latestData) {
  const banner = document.getElementById("reach-banner");
  const line = document.getElementById("reach-line");
  if (!banner || !line) return;
  const g = latestData && latestData.google;
  if (!g || g.error || !g.summary) {
    banner.style.display = "none";
    return;
  }
  const s = g.summary;
  const dr = g.data_range || {};
  const imps = (s.total_impressions || 0).toLocaleString();
  const queries = s.total_queries || 0;
  banner.style.display = "block";
  line.innerHTML = "Last week, BCC's website was shown in <strong>" + imps + "</strong> Google searches across <strong>" + queries + "</strong> different queries -- people seeking compassionate, evidence-based weight-management and behavioral-health support.";
}

function renderTopSearches(latestData) {
  const wrap = document.getElementById("top-searches-list");
  const card = document.getElementById("top-searches-card");
  if (!wrap) return;
  const g = latestData && latestData.google;
  if (!g || g.error || !g.top_queries || !g.top_queries.length) {
    if (card) card.innerHTML = "<div style=\"color:var(--muted); font-style:italic; padding:6px;\">No GSC data this week.</div>";
    return;
  }
  // Filter out branded queries for client view (keep board clean)
  const isBranded = (q) => /bcc|bariatric counseling center|bariatriccounselingcenter|sara hamilton/i.test(q);
  const items = g.top_queries
    .filter(q => !isBranded(q.keyword) && q.impressions > 0)
    .slice(0, 12);
  wrap.innerHTML = "";
  for (const q of items) {
    const row = el("div", { className: "topic-row" });
    row.appendChild(el("div", { className: "t-name" }, q.keyword));
    const imp = el("div", { className: "t-imp" });
    imp.innerHTML = "<strong>" + (q.impressions || 0).toLocaleString() + "</strong> impressions";
    row.appendChild(imp);
    wrap.appendChild(row);
  }
}


// ===== BOOT =====
async function boot() {
  const loading = document.getElementById("loading");
  const content = document.getElementById("content");
  try {
    const manifest = await loadManifest();
    // Accept both manifest shapes:
    //   A (runner-shape):     { latest: "seo-data-X.json", files: ["seo-data-X.json", ...] }
    //   B (legacy date-list): { latestDate: "YYYY-MM-DD", availableDates: ["YYYY-MM-DD", ...] }
    let files = [];
    let latestFilename = null;
    if (Array.isArray(manifest.files) && manifest.files.length) {
      files = manifest.files.slice(0, 12).reverse(); // oldest -> newest
      latestFilename = manifest.latest;
    } else if (Array.isArray(manifest.availableDates) && manifest.availableDates.length) {
      const dates = manifest.availableDates.slice(0, 12).reverse();
      files = dates.map(d => `seo-data-${d}.json`);
      latestFilename = manifest.latestDate
        ? `seo-data-${manifest.latestDate}.json`
        : files[files.length - 1];
    }
    if (!files.length) throw new Error("No data files in manifest.");

    // Load all data files in parallel
    const dataFiles = await Promise.all(
      files.map(f => loadDataFile(f, { isLatest: f === latestFilename }).catch(() => null))
    );
    const valid = dataFiles.filter(d => d && d.brave);
    if (!valid.length) throw new Error("No usable data files.");

    const history = valid.map(summarize);
    const latest = valid[valid.length - 1];
    const latestSummary = history[history.length - 1];

    renderHeader(latest);
    renderReachBanner(latest);
    renderTopSearches(latest);
    renderStats(latestSummary, history);
    renderAreas(latestSummary, history, latest);
    renderPages(valid);
    renderHeatmap(history);

    loading.classList.add("hidden");
    content.classList.remove("hidden");
  } catch (e) {
    loading.innerHTML = `<div class="error">Unable to load the latest snapshot. Please refresh in a moment.<br/><small style="color:var(--muted);">${(e.message || e).toString().replace(/[<>]/g, "")}</small></div>`;
  }
}

boot();
</script>
